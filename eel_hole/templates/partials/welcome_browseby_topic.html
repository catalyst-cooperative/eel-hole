<p>
  We have curated a few clusters of tables for topics we know PUDL users care
  about.
</p>
<ul id="topics">
  {% for topic in topics %}
    <li>
      {{ topic.name }}
      <dl class="ml-5">
        {% for t in topic.tables %}
          <dt><a href="/preview/pudl/{{ t.name }}">{{ t.name }}</a></dt>
          <dd>{{ t.summary|safe }}</dd>
        {% endfor %}
      </dl>
    </li>
  {% endfor %}
</ul>
