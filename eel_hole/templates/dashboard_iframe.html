{% extends "base.html" %}

{% block title %}{{ dashboard.title }} - PUDL Data Viewer{% endblock %}

{% block extra_head %}
  <style>
    /*
     * Make dashboard iframe take up the whole page underneath the navbar.
     */

    #main-content {
      flex: 1;
      display: flex;
    }

    .dashboard-iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
{% endblock %}

{% block content %}
  <iframe
    src="{{ hosted_url }}"
    title="{{ dashboard.title }}"
    class="dashboard-iframe"
  ></iframe>
{% endblock %}
